<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <div class="container py-4">
    <h1 class="mb-4 text-center">File Upload App</h1>
    <form id="uploadForm" class="mb-4" enctype="multipart/form-data">
      <div class="input-group">
        <input type="file" name="file" class="form-control" required />
        <button class="btn btn-primary" type="submit">Upload</button>
      </div>
    </form>
    <h2>Uploaded Files</h2>
    <ul id="filesList" class="list-group"></ul>
  </div>
  <footer class="mt-auto py-3 bg-white text-center">&copy; 2025 File Upload App</footer>

  <script>
    async function fetchFiles() {
      const res = await fetch('/files');
      const files = await res.json();
      const list = document.getElementById('filesList');
      list.innerHTML = '';
      files.forEach(f => {
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';
        li.textContent = f;
        const link = document.createElement('a');
        link.href = `/uploads/${f}`;
        link.textContent = 'Download';
        link.className = 'btn btn-sm btn-outline-secondary';
        li.appendChild(link);
        list.appendChild(li);
      });
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const res = await fetch('/upload', {
        method: 'POST',
        body: formData
      });
      if (res.ok) {
        e.target.reset();
        await fetchFiles();
      } else {
        alert('Upload failed');
      }
    });

    // Initial fetch
    fetchFiles();
  </script>
</body>
</html>
